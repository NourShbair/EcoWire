# Test configuration — overrides main application.properties

# Spring AI / OpenAI — use a dummy key so context loads without a real API call
spring.ai.openai.api-key=test-key
spring.ai.openai.chat.options.model=gpt-4o

# Use H2 in-memory for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Flyway for tests (JPA will create schema)
spring.flyway.enabled=false

# JWT Configuration (test values)
ecowire.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLW9ubHk=
ecowire.jwt.expiration=86400000

# Disable active profile override so test properties take effect
spring.profiles.active=
