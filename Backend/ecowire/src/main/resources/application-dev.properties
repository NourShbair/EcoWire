# =============================================================
# DEV profile — Supabase cloud PostgreSQL (development project)
#
# HOW TO SET UP:
#   1. Go to https://supabase.com and create a FREE project
#      named "ecowire-dev"
#   2. In your project: Settings → Database → Connection string
#      → select "JDBC" and copy the URL
#   3. Replace the placeholder values below with your actual
#      Supabase dev credentials
#   4. DO NOT commit real credentials — add this file to
#      .gitignore or use environment variables (see .env.example)
# =============================================================

# ─────────────────────────────────────────────
# Supabase Dev Database
# Format: jdbc:postgresql://<host>:5432/postgres?sslmode=require
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://aws-1-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.nqmzmgvvkspqkaleqqwt
spring.datasource.password=ecowiredev@123
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ─────────────────────────────────────────────
# JPA
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─────────────────────────────────────────────
# Flyway — runs V1 schema + V2 seed data automatically
# ─────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.clean-on-validation-error=false
# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
ecowire.jwt.secret=ZWNvd2lyZS1zdXBlci1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tMjAyNQ==
ecowire.jwt.expiration=86400000
