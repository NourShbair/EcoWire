spring.application.name=ecowire

# ─────────────────────────────────────────────
# Active profile: override with -Dspring.profiles.active=prod
# ─────────────────────────────────────────────
spring.profiles.active=dev

# ─────────────────────────────────────────────
# Server
# ─────────────────────────────────────────────
server.port=8081

# ─────────────────────────────────────────────
# JPA shared settings (profile files override where needed)
# ─────────────────────────────────────────────
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ─────────────────────────────────────────────
# Flyway shared settings
# ─────────────────────────────────────────────
spring.flyway.locations=classpath:db/migration

# ─────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────
logging.level.com.ecowire=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.flywaydb=INFO

# ─────────────────────────────────────────────
# Spring AI / OpenAI (configured per profile)
# ─────────────────────────────────────────────
spring.ai.openai.chat.options.model=gpt-4o
