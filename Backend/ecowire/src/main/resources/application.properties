spring.application.name=ecowire

# Profile configuration
spring.profiles.active=dev

# Server configuration
server.port=8081

# Logging
logging.level.com.ecowire=DEBUG
logging.level.org.springframework.web=DEBUG




# PostgreSQL (production)
spring.datasource.url=jdbc:postgresql://localhost:5432/ecowire
spring.datasource.username=postgres
spring.datasource.password=suraksha
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration


# H2 testing
spring.datasource.url=jdbc:h2:mem:ecowire;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=false
spring.jpa.open-in-view=false


