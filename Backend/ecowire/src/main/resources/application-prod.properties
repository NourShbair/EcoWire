# =============================================================
# PROD profile — Supabase cloud PostgreSQL (production project)
#
# All values MUST be supplied via environment variables.
# Never hardcode credentials in this file.
#
# Required environment variables:
#   PROD_DB_URL       — JDBC connection string (with ?sslmode=require)
#   PROD_DB_USERNAME  — Supabase DB username
#   PROD_DB_PASSWORD  — Supabase DB password
#
# To activate this profile:
#   java -jar ecowire.jar -Dspring.profiles.active=prod
#   OR set SPRING_PROFILES_ACTIVE=prod in your environment
# =============================================================

# ─────────────────────────────────────────────
# Supabase Prod Database (env vars only — no defaults)
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://aws-1-eu-north-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.efbkjuntehwcoktholbx
spring.datasource.password=ecowireprod@123
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP) — tuned for production
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ─────────────────────────────────────────────
# JPA — validate only, never auto-create in prod
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─────────────────────────────────────────────
# Flyway — schema migrations run on startup
# ─────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ─────────────────────────────────────────────
# Logging — quieter in production
# ─────────────────────────────────────────────
logging.level.com.ecowire=INFO
logging.level.org.springframework.web=WARN
logging.level.org.flywaydb=INFO
